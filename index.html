  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');

            const reader = ds.readable.getReader();
            writer.write(bytes);

      // and tear down the wrapper. Non-# links navigate the parent to the

            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

            'else scrollTo({top:0, behavior:"smooth"});' +

      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

          try {

            s.textContent = await r.text();

        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

,-50%); white-space:nowrap; font-size:clamp(15px,2.7vw,21px); font-style:italic; letter-spacing:.2em; opacity:0; padding:15px 22px; will-change:left,top,opacity,transform; text-shadow:0 0 1px rgba(243,239,230,0);\"><\u002Fdiv>\n    <div ref=\"{{ refInvBalance }}\" onclick=\"{{ enterBalance }}\" style=\"position:absolute; left:0; top:0; transform:translate(-50%,-50%); white-space:nowrap; font-size:clamp(15px,2.7vw,21px); font-style:italic; letter-spacing:.2em; opacity:0; padding:15px 22px; will-change:left,top,opacity,transform; text-shadow:0 0 1px rgba(243,239,230,0);\"><\u002Fdiv>\n    <div ref=\"{{ refInvSand }}\" onclick=\"{{ enterSand }}\" style=\"position:absolute; left:0; top:0; transform:translate(-50%,-50%); white-space:nowrap; font-size:clamp(15px,2.7vw,21px); font-style:italic; letter-spacing:.2em; opacity:0; padding:15px 22px; will-change:left,top,opacity,transform; text-shadow:0 0 1px rgba(243,239,230,0);\"><\u002Fdiv>\n    <div ref=\"{{ refInvSeed }}\" onclick=\"{{ enterSeed }}\" style=\"position:absolute; left:0; top:0; transform:translate(-50%,-50%); white-space:nowrap; font-size:clamp(15px,2.7vw,21px); font-style:italic; letter-spacing:.2em; opacity:0; padding:15px 22px; will-change:left,top,opacity,transform; text-shadow:0 0 1px rgba(243,239,230,0);\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE WELL ============================== -->\n  <div ref=\"{{ refWellLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:radial-gradient(130% 85% at 50% -12%, #161619 0%, #0a0a0c 32%, #000 72%);\">\n    <div style=\"position:absolute; top:17%; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, rgba(243,239,230,.10), transparent);\"><\u002Fdiv>\n    <canvas ref=\"{{ refWellCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refWellText }}\" style=\"position:absolute; left:0; right:0; top:56%; text-align:center; opacity:0; transition:opacity 3.2s ease; font-style:italic; font-size:clamp(21px,4.4vw,33px); line-height:1.55; letter-spacing:.02em; text-shadow:0 0 34px rgba(247,236,212,.30); padding:0 9vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE SEEING ============================== -->\n  <div ref=\"{{ refSeeingLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:#000;\">\n    <canvas ref=\"{{ refSeeingCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refSeeingText }}\" style=\"position:absolute; left:0; right:0; top:50%; text-align:center; font-size:clamp(17px,3.3vw,24px); line-height:1.55; letter-spacing:.10em; text-shadow:0 0 30px rgba(206,214,226,.28); padding:0 9vw;\"><\u002Fdiv>\n    <div ref=\"{{ refSeeingFinale }}\" style=\"position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); text-align:center; opacity:0; font-style:italic; font-size:clamp(19px,3.8vw,28px); line-height:1.6; letter-spacing:.04em; text-shadow:0 0 34px rgba(214,222,234,.4); padding:0 13vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE TIDE ============================== -->\n  <div ref=\"{{ refTideLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:linear-gradient(180deg, #07070a 0%, #000 58%);\">\n    <canvas ref=\"{{ refTideCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refTideText }}\" style=\"position:absolute; left:0; right:0; top:24%; text-align:center; opacity:0; font-size:clamp(18px,3.6vw,26px); line-height:1.5; letter-spacing:.10em; text-shadow:0 0 30px rgba(224,230,238,.30); padding:0 9vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE PATH ============================== -->\n  <div ref=\"{{ refPathLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:#000;\">\n    <canvas ref=\"{{ refPathCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refPathText }}\" style=\"position:absolute; left:0; top:0; transform:translate(-50%,-50%); white-space:nowrap; opacity:0; font-style:italic; font-size:clamp(18px,3.4vw,26px); letter-spacing:.06em; text-shadow:0 0 26px rgba(236,238,242,.4); pointer-events:none; will-change:opacity,left,top;\"><\u002Fdiv>\n    <div ref=\"{{ refPathFinale }}\" style=\"position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); text-align:center; opacity:0; font-style:italic; font-size:clamp(19px,3.8vw,28px); line-height:1.6; letter-spacing:.04em; text-shadow:0 0 34px rgba(236,238,242,.4); padding:0 13vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE DOOR ============================== -->\n  <div ref=\"{{ refDoorLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:#000;\">\n    <canvas ref=\"{{ refDoorCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refDoorText }}\" style=\"position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); text-align:center; opacity:0; font-style:italic; font-size:clamp(20px,4vw,30px); line-height:1.55; letter-spacing:.03em; text-shadow:0 0 30px rgba(247,236,212,.45); padding:0 17vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE CONSTELLATION ============================== -->\n  <div ref=\"{{ refConstLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:radial-gradient(120% 120% at 50% 40%, #06070b 0%, #000 70%);\">\n    <canvas ref=\"{{ refConstCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refConstText }}\" style=\"position:absolute; left:0; right:0; top:74%; text-align:center; opacity:0; font-style:italic; font-size:clamp(18px,3.5vw,26px); line-height:1.55; letter-spacing:.06em; text-shadow:0 0 28px rgba(222,228,240,.4); padding:0 11vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE LETTING ============================== -->\n  <div ref=\"{{ refLetLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:linear-gradient(180deg, #000 40%, #08070a 100%);\">\n    <canvas ref=\"{{ refLetCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refLetText }}\" style=\"position:absolute; left:0; right:0; top:30%; text-align:center; opacity:0; font-style:italic; font-size:clamp(19px,3.7vw,27px); line-height:1.55; letter-spacing:.05em; text-shadow:0 0 30px rgba(247,236,212,.38); padding:0 12vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE WINDOW ============================== -->\n  <div ref=\"{{ refWindowLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:#05060a;\">\n    <canvas ref=\"{{ refWindowCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refWindowText }}\" style=\"position:absolute; left:0; right:0; top:45%; text-align:center; opacity:0; font-style:italic; font-size:clamp(17px,3.1vw,23px); line-height:1.5; letter-spacing:.05em; color:#f7f3ec; text-shadow:0 0 22px rgba(12,16,26,.95), 0 1px 5px rgba(12,16,26,.95); padding:0 17vw; pointer-events:none;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE BELL ============================== -->\n  <div ref=\"{{ refBellLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:radial-gradient(120% 120% at 50% 46%, #0a0b0f 0%, #000 72%);\">\n    <canvas ref=\"{{ refBellCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refBellText }}\" style=\"position:absolute; left:0; right:0; top:64%; text-align:center; opacity:0; font-style:italic; font-size:clamp(18px,3.5vw,26px); line-height:1.55; letter-spacing:.06em; text-shadow:0 0 28px rgba(214,224,236,.4); padding:0 13vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE SEED ============================== -->\n  <div ref=\"{{ refSeedLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:radial-gradient(120% 95% at 50% 112%, #0a0d0a 0%, #000 60%);\">\n    <canvas ref=\"{{ refSeedCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refSeedText }}\" style=\"position:absolute; left:0; right:0; top:13%; text-align:center; opacity:0; font-style:italic; font-size:clamp(18px,3.4vw,25px); line-height:1.5; letter-spacing:.06em; text-shadow:0 0 26px rgba(200,224,196,.34); padding:0 12vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE BALANCE ============================== -->\n  <div ref=\"{{ refBalanceLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:radial-gradient(130% 130% at 50% 44%, #08090c 0%, #000 72%);\">\n    <canvas ref=\"{{ refBalanceCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <div ref=\"{{ refBalanceText }}\" style=\"position:absolute; left:0; right:0; top:70%; text-align:center; opacity:0; font-style:italic; font-size:clamp(18px,3.5vw,26px); line-height:1.5; letter-spacing:.06em; text-shadow:0 0 28px rgba(216,226,236,.4); padding:0 12vw;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============================== THE SAND ============================== -->\n  <div ref=\"{{ refSandLayer }}\" style=\"position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; background:#000;\">\n    <canvas ref=\"{{ refSandCanvas }}\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n    <input ref=\"{{ refSandInput }}\" type=\"text\" autocomplete=\"off\" autocorrect=\"off\" autocapitalize=\"none\" spellcheck=\"false\" style=\"position:absolute; left:50%; top:54%; width:64%; transform:translateX(-50%); opacity:0; font-size:16px; background:transparent; border:none; outline:none; color:transparent; caret-color:transparent; pointer-events:auto;\">\n    <div ref=\"{{ refSandText }}\" style=\"position:absolute; left:0; right:0; top:60%; text-align:center; opacity:0; font-style:italic; font-size:clamp(16px,3vw,22px); line-height:1.5; letter-spacing:.08em; text-shadow:0 0 24px rgba(238,224,190,.34); padding:0 12vw; pointer-events:none;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== THE QUIET WAY HOME ===================== -->\n  <div ref=\"{{ refReturn }}\" onclick=\"{{ goHome }}\" style=\"position:absolute; top:20px; left:50%; transform:translateX(-50%); width:48px; height:48px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 1.5s ease; pointer-events:none; cursor:default;\">\n    <div style=\"width:5px; height:5px; border-radius:50%; background:#f3efe6; opacity:.5; box-shadow:0 0 11px rgba(243,239,230,.55); transition:opacity 1s ease;\"><\u002Fdiv>\n    <div ref=\"{{ refReturnLabel }}\" style=\"position:absolute; top:32px; left:50%; transform:translateX(-50%); white-space:nowrap; font-style:italic; font-size:13px; letter-spacing:.32em; opacity:0; transition:opacity 1s ease;\">the threshold<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;pace&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0.5,&quot;max&quot;:2.5,&quot;step&quot;:0.1},&quot;patience&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0.5,&quot;max&quot;:2.5,&quot;step&quot;:0.1}}\">\nclass Component extends DCLogic {\n\n  /* ╔════════════════════════════════════════════════════════════════════════╗\n     ║  FRAGMENTS — rewrite freely. This is the only text block.                ║\n     ║  Each room leans toward a sensibility; none is a quotation.              ║\n     ╚════════════════════════════════════════════════════════════════════════╝ */\n  TEXT = {\n\n    // THE THRESHOLD — the seven faint invitations (each is also a door).\n    invitations: {\n      seeing: 'stay, and see',\n      const:  'join the lights',\n      tide:   'breathe with the tide',\n      path:   'make a way',\n      door:   'part the dark',\n      letting:'open your hand',\n      window: 'go to the window',\n      bell:   'strike, and listen',\n      well:   'go down to the water',\n      balance:'find the level',\n      sand:   'write it in the sand',\n      seed:   'leave something to grow',\n    },\n\n    // THE WELL — Rumi's longing, the Tao's reciprocity.\n    //   Each long-held touch sends something down; a changed thing rises.\n    //   The echoes come in order, building a litany, closing in a benediction.\n    well: [\n      ['You sent down a stone.',          'The water returns a star.'],\n      ['What sank as grief',              'rises as salt, and shines.'],\n      ['Down went the question.',         'Up comes the open hand.'],\n      ['You gave the dark your name.',    'It hands you back a door.'],\n      ['The weight you could not carry,', 'the depth has carried for you.'],\n      ['You let go of the asking.',       'The letting go was the answer.'],\n    ],\n    wellBenediction: [\n      'Whatever you give the deep,',\n      'it keeps, and changes, and returns —',\n      'never the same, and never lost.',\n    ],\n\n    // THE SEEING — Franck's seeing, the Zen of dwelling.\n    //   The lines gather for the one who stays; then the form opens.\n    seeing: [\n      'Stay.',\n      'The form was always here.',\n      'It was only waiting for your stillness.',\n      'Nothing moves —',\n      'and everything is happening.',\n      'Keep looking.',\n      'What you behold for long enough',\n      'begins, at last, to behold you.',\n    ],\n    seeingFinale: 'And then there is no looking and no form — only the seen and the seeing, which were never two.',\n\n    // THE TIDE — Gibran & Tagore, surrender to the larger rhythm.\n    //   Attune your breath to the rising light and the lines surface, one by one.\n    tide: [\n      'Breathe with it.',\n      'You are not the wave.',\n      'You are the breath beneath the wave.',\n      'Rise when it rises.',\n      'Fall when it falls.',\n      'Stop counting. Stop holding on.',\n      'Give yourself to the rhythm,',\n      'and the rhythm will carry you.',\n      'Nothing here is yours to keep —',\n      'and nothing here is lost.',\n    ],\n    tideDawn: 'See — the dark was only the long night before a light you did not have to make.',\n\n    // THE PATH — the Tao: the way is made by walking. A word grows where you pause.\n    path: [\n      'There is no path.',\n      'You make it by walking.',\n      'Walk slowly.',\n      'The way is the walking.',\n      'Behind you, it closes.',\n      'Ahead, only the next step.',\n      'Do not hurry toward the end.',\n      'The end is each step you take.',\n    ],\n    pathArrival: 'And the road, when you turn to look, was the whole of the journey.',\n\n    // THE DOOR — Rumi & Gibran, the guest and the threshold of light.\n    //   Hold it open and the litany floods through, line by line.\n    door: [\n      'All this dark was only a door.',\n      'You were the hand it waited for.',\n      'The wall was never a wall.',\n      'Open it a little —',\n      'a little is enough.',\n      'What you part with your hands',\n      'has been leaning toward you all along.',\n    ],\n    doorWelcome: 'Come in. You are the guest the light prepared the room for.',\n\n    // THE CONSTELLATION — the namer, the seer of patterns.\n    //   Join the scattered lights; each line you draw surfaces a line of verse.\n    const: [\n      'Scattered, they are only lights.',\n      'Joined, they become a figure.',\n      'Nothing has been added.',\n      'Only the line you drew —',\n      'the line that was always waiting.',\n      'This is how meaning is made.',\n    ],\n    constComplete: 'The dark did not change. You did.',\n\n    // THE LETTING — the Tao of non-grasping, Gibran's parting.\n    //   Open your hand; release the lights one by one. They rise, and become stars.\n    letting: [\n      'Open your hand.',\n      'This one — let it go.',\n      'And this. It was never yours to keep.',\n      'You do not lose what you release.',\n      'You only set it where it belongs.',\n      'Lighter now.',\n      'Lighter still.',\n    ],\n    lettingEmpty: 'Your hands are empty. Now they are open enough to hold the sky.',\n\n    // THE WINDOW — the watcher's aperture; Bashō's passing world, the monk's cell.\n    //   Wipe the cold glass to see out. Time moves whether you watch or not.\n    window: {\n      dawn:  'Morning, again, without being asked.',\n      day:   'The world does not need you to watch it. Watch it anyway.',\n      dusk:  'Everything golden is leaving. That is what makes it golden.',\n      night: 'The dark out there and the dark in here are the same dark.',\n    },\n\n    // THE BELL — the Zen bell; the Tao's bowl, useful for its emptiness.\n    //   Strike once, then let it fade all the way. The silence is the gift.\n    bell: [\n      'The bell is mostly silence.',\n      'The sound was the silence, made briefly visible.',\n      'Strike less. Listen more.',\n      'What rang is already gone.',\n      'What remained was here before the bell.',\n      'Let it fade all the way — the fading is the gift.',\n    ],\n\n    // THE SEED — the Tao of patience; it grows in real time, while you are away.\n    //   Press and hold to plant. Then leave. Come back later — even days later.\n    seed: {\n      empty:  'Press and hold to plant something.',\n      plant:  'Planted. Now leave it be.',\n      stir:   'Something stirs under the dark.',\n      sprout: 'A green thought breaks the surface.',\n      grow:   'It is growing while you are away.',\n      bud:    'It made a bud without your watching.',\n      bloom:  'You were not here when it opened. It opened anyway.',\n    },\n\n    // THE BALANCE — equilibrium; the still point found, not forced.\n    //   Hold the device level (or rest the cursor at center) and settle.\n    balance: [\n      'Hold it level.',\n      'Not by forcing — by settling.',\n      'The still point is not held. It is found.',\n      'Be the surface the water rests on.',\n      'Level is not a place. It is a letting-be.',\n    ],\n    balanceFound: 'There. You were the level all along.',\n\n    // THE SAND — impermanence; name a thing, then let the wind take it.\n    //   Type, and the words form in light; pause, and the wind scatters them.\n    sandPrompt: 'Write something — then let the wind take it.',\n    sandAfter:  'Gone. And you are lighter for the writing.',\n  };\n  /* ─────────────────────────── end of editable text ─────────────────────────── */\n\n  // ── refs ──\n  refRoot = React.createRef();\n  refThreshold = React.createRef();\n  refInvSeeing = React.createRef();\n  refInvConst = React.createRef();\n  refInvTide = React.createRef();\n  refInvPath = React.createRef();\n  refInvDoor = React.createRef();\n  refInvLet = React.createRef();\n  refInvWindow = React.createRef();\n  refInvBell = React.createRef();\n  refInvWell = React.createRef();\n  refInvBalance = React.c       ref:this.refInvSeeing,  rx:0.22, ry:0.26, d:0.85 },\n      { key:'constellation', ref:this.refInvConst,   rx:0.50, ry:0.15, d:1.00 },\n      { key:'tide',          ref:this.refInvTide,    rx:0.79, ry:0.24, d:0.80 },\n      { key:'path',          ref:this.refInvPath,    rx:0.13, ry:0.50, d:0.72 },\n      { key:'door',          ref:this.refInvDoor,    rx:0.385,ry:0.43, d:0.95 },\n      { key:'well',          ref:this.refInvWell,    rx:0.63, ry:0.40, d:0.90 },\n      { key:'window',        ref:this.refInvWindow,  rx:0.87, ry:0.53, d:0.75 },\n      { key:'letting',       ref:this.refInvLet,     rx:0.27, ry:0.71, d:0.85 },\n      { key:'bell',          ref:this.refInvBell,    rx:0.52, ry:0.65, d:0.90 },\n      { key:'balance',       ref:this.refInvBalance, rx:0.75, ry:0.74, d:0.80 },\n      { key:'sand',          ref:this.refInvSand,    rx:0.46, ry:0.87, d:0.70 },\n      { key:'seed',          ref:this.refInvSeed,    rx:0.15, ry:0.84, d:0.78 },\n    ];\n    this.field.forEach(d=> d.ph = Math.random()*6.28);\n    this.focus = { x:-9999, y:-9999 };\n  }\n  onThreshMove = (e)=>{ if(this.place!=='threshold') return; this.focus = { x:e.clientX, y:e.clientY }; };\n  onThreshLeave = ()=>{ this.focus = { x:-9999, y:-9999 }; };\n  onThreshUp = (e)=>{\n    if(this.place!=='threshold' || this.armed<0 || !this.field) return;\n    const d=this.field[this.armed]; const {w,h}=this.dim;\n    const dist=Math.hypot(d.rx*w - e.clientX, d.ry*h - e.clientY);\n    if(dist < Math.min(w,h)*0.20) this.goTo(d.key);\n  };\n  updateThreshold(dt){\n    if(!this.field) return;\n    const {w,h}=this.dim, t=this.now();\n    const igniteR=Math.min(w,h)*0.27;\n    const breath=0.035+0.022*Math.sin(t*0.5);\n    let armed=-1, armedDist=1e9;\n    this.field.forEach((d,i)=>{\n      const el=d.ref.current; if(!el) return;\n      const driftx=Math.sin(t*0.13 + d.ph)*w*0.011*d.d;\n      const drifty=Math.cos(t*0.11 + d.ph*1.3)*h*0.011*d.d;\n      const px=d.rx*w + driftx, py=d.ry*h + drifty;\n      el.style.left=px.toFixed(1)+'px'; el.style.top=py.toFixed(1)+'px';\n      const dist=Math.hypot(px-this.focus.x, py-this.focus.y);\n      const near=this.smooth(1 - dist/igniteR);\n      const vis=this.visited[d.key]? 0.07 : 0;\n      const op=Math.min(0.96, breath*d.d + near*0.85 + vis);\n      el.style.opacity=op.toFixed(3);\n      el.style.transform='translate(-50%,-50%) scale('+(1+near*0.13*d.d).toFixed(3)+')';\n      el.style.textShadow = near>0.04 ? '0 0 '+(near*28).toFixed(0)+'px rgba(243,239,230,'+(near*0.42).toFixed(2)+')' : '0 0 1px rgba(243,239,230,0)';\n      if(dist<armedDist){ armedDist=dist; armed=i; }\n    });\n    this.armed = (armedDist < igniteR*0.85) ? armed : -1;\n  }\n\n  // ════════════════════ THE SEED (real wall-clock time) ════════════════════\n  seedStages(){ return [ {k:'stir',t:20},{k:'sprout',t:90},{k:'grow',t:360},{k:'bud',t:1080},{k:'bloom',t:3600} ]; }\n  seedElapsed(){ return this.SD.plantedAt ? (Date.now()-this.SD.plantedAt)/1000 : 0; }\n  resetSeed(){\n    let v=null; try{ v=localStorage.getItem('thr_seed_plantedAt'); }catch(e){}\n    this.SD.plantedAt = v ? parseInt(v,10) : null;\n    this.SD.planting=false; this.SD.holdT=0;\n    if(this.refSeedText.current){ this.refSeedText.current.style.opacity='0'; this.refSeedText.current.textContent=''; this.refSeedText.current.__k=''; }\n  }\n  onSeedDown = (e)=>{ if(this.place!=='seed') return; e.preventDefault(); this.SD.planting=true; this.SD.holdT=0; };\n  onSeedUp = ()=>{\n    if(this.place!=='seed' || !this.SD.planting) return; this.SD.planting=false;\n    if(this.SD.holdT>=1.4){\n      const bloomed = this.SD.plantedAt && this.seedElapsed()>=3600;\n      if(!this.SD.plantedAt || bloomed){ this.SD.plantedAt=Date.now(); try{ localStorage.setItem('thr_seed_plantedAt', String(this.SD.plantedAt)); }catch(e){} }\n    }\n  };\n  updateSeed(dt){\n    const SD=this.SD, ctx=this.sdc; if(!ctx) return; const {w,h}=this.dim, t=this.now();\n    if(SD.planting) SD.holdT+=dt;\n    ctx.clearRect(0,0,w,h);\n    const soilY=h*0.80;\n    const sl=ctx.createLinearGradient(0,soilY-3,0,soilY+3);\n    sl.addColorStop(0,'rgba(150,170,150,0)'); sl.addColorStop(0.5,'rgba(150,170,150,0.10)'); sl.addColorStop(1,'rgba(150,170,150,0)');\n    ctx.fillStyle=sl; ctx.fillRect(0,soilY-3,w,6);\n\n    let line='';\n    if(!SD.plantedAt){\n      const press=this.clamp(SD.holdT/1.4,0,1);\n      const r=Math.min(w,h)*0.012*(1+press*0.9);\n      const g=ctx.createRadialGradient(w/2,soilY,0,w/2,soilY,r*6);\n      g.addColorStop(0,'rgba(238,224,180,'+(0.45+press*0.45).toFixed(3)+')'); g.addColorStop(1,'rgba(238,224,180,0)');\n      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(w/2,soilY,r*6,0,7); ctx.fill();\n      ctx.fillStyle='rgba(255,246,224,'+(0.7+press*0.3).toFixed(3)+')'; ctx.beginPath(); ctx.arc(w/2,soilY,r,0,7); ctx.fill();\n      line=this.TEXT.seed.empty;\n    } else {\n      const el=this.seedElapsed();\n      const g=Math.pow(this.clamp(el/3600,0,1), 0.5);\n      this.drawPlant(ctx, w/2, soilY, g, t);\n      const stages=this.seedStages(); let key='plant';\n      for(const s of stages){ if(el>=s.t) key=s.k; }\n      line=this.TEXT.seed[key];\n    }\n    const el2=this.refSeedText.current;\n    if(el2){ if(el2.__k!==line){ el2.textContent=line; el2.__k=line; } const target=line?0.9:0; const cur=parseFloat(el2.style.opacity||'0'); el2.style.opacity=(cur+(target-cur)*Math.min(1,dt*1.1)).toFixed(3); }\n  }\n  drawPlant(ctx, x, soilY, g, t){\n    const {w,h}=this.dim, maxH=h*0.54, stemH=g*maxH, topY=soilY-stemH;\n    const sway=Math.sin(t*0.5)*Math.min(w,h)*0.01*g;\n    ctx.strokeStyle='rgba(168,206,150,'+(0.4+0.3*g).toFixed(3)+')'; ctx.lineWidth=1.6; ctx.lineCap='round';\n    ctx.shadowColor='rgba(150,210,140,0.5)'; ctx.shadowBlur=8;\n    ctx.beginPath(); ctx.moveTo(x,soilY);\n    const segs=16; for(let i=1;i<=segs;i++){ const f=i/segs, yy=soilY-f*stemH, xx=x + sway*f + Math.sin(f*3+t*0.4)*Math.min(w,h)*0.006*g; ctx.lineTo(xx,yy); }\n    ctx.stroke(); ctx.shadowBlur=0;\n    if(g>0.25) this.drawLeaf(ctx, x+sway*0.4, soilY-stemH*0.42, -1, g);\n    if(g>0.45) this.drawLeaf(ctx, x+sway*0.6, soilY-stemH*0.64, 1, g);\n    const tx=x+sway, ty=topY;\n    if(g>0.7 && g<0.92){\n      const r=Math.min(w,h)*0.02*((g-0.7)/0.22+0.4);\n      ctx.fillStyle='rgba(206,210,176,0.55)'; ctx.beginPath(); ctx.ellipse(tx,ty,r*0.6,r,0,0,7); ctx.fill();\n    } else if(g>=0.92){\n      const bloom=(g-0.92)/0.08, R=Math.min(w,h)*0.05*(0.6+bloom);\n      const gg=ctx.createRadialGradient(tx,ty,0,tx,ty,R);\n      gg.addColorStop(0,'rgba(255,246,224,0.9)'); gg.addColorStop(0.4,'rgba(247,224,180,0.4)'); gg.addColorStop(1,'rgba(247,224,180,0)');\n      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(tx,ty,R,0,7); ctx.fill();\n      ctx.strokeStyle='rgba(255,248,228,0.7)'; ctx.lineWidth=1.4;\n      for(let k=0;k<6;k++){ const a=k/6*Math.PI*2 + t*0.1; ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+Math.cos(a)*R*0.5, ty+Math.sin(a)*R*0.5); ctx.stroke(); }\n    }\n  }\n  drawLeaf(ctx, x, y, dir, g){\n    const {w,h}=this.dim, L=Math.min(w,h)*0.05*g;\n    ctx.fillStyle='rgba(168,206,150,0.32)';\n    ctx.beginPath(); ctx.moveTo(x,y); ctx.quadraticCurveTo(x+dir*L*0.6, y-L*0.3, x+dir*L, y); ctx.quadraticCurveTo(x+dir*L*0.6, y+L*0.2, x,y); ctx.fill();\n  }\n\n  // ════════════════════ THE BALANCE (device tilt) ════════════════════\n  requestTilt(){\n    try{\n      const D=window.DeviceOrientationEvent;\n      if(D && typeof D.requestPermission==='function'){\n        D.requestPermission().then(s=>{ if(s==='granted') window.addEventListener('deviceorientation', this.onTilt); }).catch(()=>{});\n      } else if(D){ window.addEventListener('deviceorientation', this.onTilt); }\n    }catch(e){}\n  }\n  onTilt = (e)=>{\n    if(e.gamma==null && e.beta==null) return;\n    this.BL.motion=true;\n    if(this.BL.baseBeta==null) this.BL.baseBeta=e.beta||0;\n    this.BL.rx=this.clamp((e.gamma||0)/26, -1.5, 1.5);\n    this.BL.ry=this.clamp(((e.beta||0)-this.BL.baseBeta)/26, -1.5, 1.5);\n  };\n  onBalancePointer = (e)=>{ if(this.BL.motion) return; const {w,h}=this.dim; this.BL.rx=this.clamp((e.clientX-w/2)/(w*0.4),-1.5,1.5); this.BL.ry=this.clamp((e.clientY-h*0.42)/(h*0.4),-1.5,1.5); };\n  resetBalance(){ this.BL.steady=0; this.BL.lineIdx=-1; this.BL.found=false; this.BL.baseBeta=null; if(this.refBalanceText.current){ this.refBalanceText.current.style.opacity='0'; this.refBalanceText.current.textContent=''; } }\n  updateBalance(dt){\n    const BL=this.BL, ctx=this.blc; if(!ctx) return; const {w,h}=this.dim;\n    const mag=Math.hypot(BL.rx,BL.ry), level=mag<0.16;\n    if(level && !BL.found) BL.steady+=dt; else BL.steady=Math.max(0, BL.steady-dt*1.2);\n    const thr=[3,7,12,18,25];\n    if(!BL.found){\n      let idx=-1; for(let i=0;i<thr.length;i++){ if(BL.steady>=thr[i]) idx=i; }\n      if(idx>BL.lineIdx){ BL.lineIdx=idx; const el=this.refBalanceText.current; if(el){ el.textContent=this.TEXT.balance[idx]; el.style.opacity='0'; } }\n      if(BL.lineIdx>=thr.length-1 && BL.steady>thr[thr.length-1]+3){ BL.found=true; const el=this.refBalanceText.current; if(el){ el.textContent=this.TEXT.balanceFound; el.style.opacity='0'; } }\n    }\n    const elx=this.refBalanceText.current;\n    if(elx){ const target=(BL.lineIdx>=0||BL.found)?0.95:0; const cur=parseFloat(elx.style.opacity||'0'); elx.style.opacity=(cur+(target-cur)*Math.min(1,dt*1.4)).toFixed(3); }\n\n    ctx.clearRect(0,0,w,h);\n    const cx=w/2, cy=h*0.42, off=Math.min(w,h)*0.30;\n    const bxp=cx+BL.rx*off, byp=cy+BL.ry*off;\n    const ringA=0.12 + (level?0.25:0) + (BL.found?0.2:0);\n    ctx.strokeStyle='rgba(214,224,238,'+ringA.toFixed(3)+')'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(cx,cy,off*0.16,0,7); ctx.stroke();\n    ctx.save(); ctx.translate(cx, cy+BL.ry*off*0.5); ctx.rotate(BL.rx*0.5);\n    const grdA=0.1 + (level?0.25:0.06);\n    const lg=ctx.createLinearGradient(-w*0.5,0,w*0.5,0);\n    lg.addColorStop(0,'rgba(206,216,230,0)'); lg.addColorStop(0.5,'rgba(206,216,230,'+grdA.toFixed(3)+')'); lg.addColorStop(1,'rgba(206,216,230,0)');\n    ctx.strokeStyle=lg; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(-w*0.5,0); ctx.lineTo(w*0.5,0); ctx.stroke();\n    ctx.restore();\n    const br=Math.min(w,h)*(level?0.03:0.022);\n    const bg=ctx.createRadialGradient(bxp,byp,0,bxp,byp,br*6);\n    const bA=0.5+(level?0.4:0);\n    bg.addColorStop(0,'rgba(236,242,252,'+bA.toFixed(3)+')'); bg.addColorStop(1,'rgba(236,242,252,0)');\n    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(bxp,byp,br*6,0,7); ctx.fill();\n    ctx.fillStyle='rgba(252,253,255,'+(0.7+0.3*(level?1:0)).toFixed(3)+')'; ctx.beginPath(); ctx.arc(bxp,byp,br*0.8,0,7); ctx.fill();\n    if(BL.found){ const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(w,h)*0.4); g.addColorStop(0,'rgba(220,228,240,0.10)'); g.addColorStop(1,'rgba(220,228,240,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,Math.min(w,h)*0.4,0,7); ctx.fill(); }\n  }\n\n  // ════════════════════ THE SAND (typed language, taken by the wind) ════════════════════\n  resetSand(){\n    this.SN.text=''; this.SN.particles=[]; this.SN.dispersing=false; this.SN.idleT=0; this.SN.everTyped=false; this.SN.afterT=0;\n    const i=this.refSandInput.current; if(i) i.value='';\n    if(this.refSandText.current){ this.refSandText.current.textContent=this.TEXT.sandPrompt; this.refSandText.current.style.opacity='0'; this.refSandText.current.__l=''; }\n    setTimeout(()=>{ const inp=this.refSandInput.current; if(inp && this.place==='sand'){ try{ inp.focus(); }catch(e){} } }, 320);\n  }\n  onSandTap = (e)=>{ if(this.place!=='sand') return; const i=this.refSandInput.current; if(i){ try{ i.focus(); }catch(err){} } };\n  onSandInput = ()=>{ const i=this.refSandInput.current; if(!i) return; let v=i.value||''; if(v.length>26){ v=v.slice(0,26); i.value=v; } this.SN.text=v; this.SN.everTyped=true; this.SN.idleT=0; this.SN.lastType=this.now(); this.SN.dispersing=false; this.SN.afterT=0; };\n  onSandKey = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.disperseSand(); } };\n  disperseSand(){\n    const txt=(this.SN.text||'').trim(), i=this.refSandInput.current;\n    if(!txt){ if(i) i.value=''; this.SN.text=''; return; }\n    this.SN.particles=this.makeSandParticles(txt);\n    this.SN.dispersing=true; this.SN.text=''; if(i) i.value=''; this.SN.afterT=0;\n  }\n  makeSandParticles(txt){\n    const {w,h}=this.dim, fs=Math.min(w*0.085, 60), pad=24;\n    const off=document.createElement('canvas'); const m=off.getContext('2d');\n    m.font='italic '+fs+'px Georgia, serif';\n    const tw=Math.min(m.measureText(txt).width, w*0.9);\n    off.width=Math.ceil(tw)+pad*2; off.height=Math.ceil(fs*1.7)+pad*2;\n    const o=off.getContext('2d');\n    o.font='italic '+fs+'px Georgia, serif'; o.textBaseline='middle'; o.textAlign='center'; o.fillStyle='#fff';\n    o.fillText(txt, off.width/2, off.height/2, w*0.9);\n    const img=o.getImageData(0,0,off.width,off.height).data, ps=[];\n    const cx=w/2-off.width/2, cy=h*0.40-off.height/2, step=3;\n    for(let y=0;y<off.height;y+=step){ for(let x=0;x<off.width;x+=step){ if(img[(y*off.width+x)*4+3]>80){ ps.push({ x:cx+x, y:cy+y, vx:0, vy:0, life:1, seed:Math.random() }); } } }\n    return ps;\n  }\n  updateSand(dt){\n    const SN=this.SN, ctx=this.snc; if(!ctx) return; const {w,h}=this.dim;\n    ctx.clearRect(0,0,w,h);\n    if(!SN.dispersing && SN.text && (this.now()-SN.lastType)>2.5) this.disperseSand();\n\n    if(!SN.dispersing){\n      if(SN.text){\n        const fs=Math.min(w*0.085, 60);\n        ctx.font='italic '+fs+'px Georgia, serif'; ctx.textAlign='center'; ctx.textBaseline='middle';\n        ctx.shadowColor='rgba(238,224,190,0.6)'; ctx.shadowBlur=18;\n        ctx.fillStyle='rgba(240,228,196,0.92)'; ctx.fillText(SN.text, w/2, h*0.40, w*0.9);\n        ctx.shadowBlur=0;\n      }\n    } else {\n      let alive=0;\n      SN.particles.forEach(p=>{\n        if(p.life<=0) return; alive++;\n        p.vx += (0.4 + p.seed*0.7)*dt*Math.min(w,h)*0.07;\n        p.vy += (-0.15 + (Math.random()-0.5)*0.3)*dt*Math.min(w,h)*0.03;\n        p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt*(0.22+p.seed*0.26);\n        const a=this.clamp(p.life,0,1)*0.9;\n        ctx.fillStyle='rgba(240,228,196,'+a.toFixed(3)+')'; ctx.fillRect(p.x,p.y,1.7,1.7);\n      });\n      if(alive===0){ SN.dispersing=false; SN.particles=[]; SN.afterT=0.0001; }\n    }\n\n    const el=this.refSandText.current;\n    if(el){\n      let target=0, label=el.__l||'';\n      if(!SN.everTyped){ label=this.TEXT.sandPrompt; target=0.5; }\n      else if(SN.afterT>0){ SN.afterT+=dt; label=this.TEXT.sandAfter; target = SN.afterT<4 ? 0.6 : 0; }\n      else if(SN.text){ target=0; }\n      if(label && el.__l!==label){ el.textContent=label; el.__l=label; }\n      const cur=parseFloat(el.style.opacity||'0'); el.style.opacity=(cur+(target-cur)*Math.min(1,dt*1.2)).toFixed(3);\n    }\n  }\n\n  // ── single animation loop; only the active room is drawn ──\n  loop = (ts)=>{\n    if(this._last==null) this._last=ts;\n    let dt=(ts-this._last)/1000; this._last=ts; if(dt>0.05) dt=0.05;\n    this.applyVisibility();\n    switch(this.place){\n      case 'threshold': this.updateThreshold(dt); break;\n      case 'well': this.updateWell(dt); break;\n      case 'seeing': this.updateSeeing(dt); break;\n      case 'tide': this.updateTide(dt); break;\n      case 'path': this.updatePath(dt); break;\n      case 'door': this.updateDoor(dt); break;\n      case 'constellation': this.updateConst(dt); break;\n      case 'letting': this.updateLetting(dt); break;\n      case 'window': this.updateWindow(dt); break;\n      case 'bell': this.updateBell(dt); break;\n      case 'seed': this.updateSeed(dt); break;\n      case 'balance': this.updateBalance(dt); break;\n      case 'sand': this.updateSand(dt); break;\n    }\n    this._raf = requestAnimationFrame(this.loop);\n  };\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Threshold.export"}
